spring:
  application:
    name: demo

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: 8092


  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true